<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Note Taker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/4.1.3/flatly/bootstrap.min.css" />
  <style>
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
    }
    .hero-card {
      text-align: center;
      padding: 3rem 4rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .hero-card h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #2c3e50;
    }
    .hero-card p {
      color: #7f8c8d;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-dark bg-dark">
    <a class="navbar-brand" href="/">Note Taker</a>
  </nav>
  <div class="hero">
    <div class="hero-card">
      <h1>Note Taker <span role="img" aria-label="Memo">📝</span></h1>
      <p>Capture your thoughts. Find them later.</p>
      <a class="btn btn-primary btn-lg" href="/notes" role="button">Get Started</a>
    </div>
  </div>
</body>

</html>
